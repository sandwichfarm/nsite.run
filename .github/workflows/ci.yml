name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate (fmt, lint, type check, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check apps/relay/src/main.ts apps/blossom/src/main.ts apps/gateway/src/main.ts packages/shared/src/mod.ts

      - name: Test
        run: deno test --allow-all

  build-and-size-check:
    name: Build and bundle size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: deno install

      - name: Build all bundles
        run: deno task build

      - name: Build SPA
        run: |
          cd apps/spa
          npm ci
          npm run build

      - name: Enforce bundle size limits
        run: deno run --allow-read scripts/check-bundle-sizes.ts

      - name: Record bundle sizes
        run: |
          echo "RELAY_SIZE=$(stat -c%s apps/relay/dist/relay.bundle.js)" >> $GITHUB_ENV
          echo "BLOSSOM_SIZE=$(stat -c%s apps/blossom/dist/blossom.bundle.js)" >> $GITHUB_ENV
          echo "GATEWAY_SIZE=$(stat -c%s apps/gateway/dist/gateway.bundle.js)" >> $GITHUB_ENV

  bundle-delta:
    name: Bundle size delta (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Build base branch
        run: deno task build

      - name: Record base bundle sizes
        run: |
          echo "RELAY_BASE=$(stat -c%s apps/relay/dist/relay.bundle.js 2>/dev/null || echo 0)" >> $GITHUB_ENV
          echo "BLOSSOM_BASE=$(stat -c%s apps/blossom/dist/blossom.bundle.js 2>/dev/null || echo 0)" >> $GITHUB_ENV
          echo "GATEWAY_BASE=$(stat -c%s apps/gateway/dist/gateway.bundle.js 2>/dev/null || echo 0)" >> $GITHUB_ENV

      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Build PR branch
        run: deno task build

      - name: Record PR bundle sizes
        run: |
          echo "RELAY_PR=$(stat -c%s apps/relay/dist/relay.bundle.js)" >> $GITHUB_ENV
          echo "BLOSSOM_PR=$(stat -c%s apps/blossom/dist/blossom.bundle.js)" >> $GITHUB_ENV
          echo "GATEWAY_PR=$(stat -c%s apps/gateway/dist/gateway.bundle.js)" >> $GITHUB_ENV

      - name: Post bundle size delta comment
        uses: actions/github-script@v7
        with:
          script: |
            const relayBase = parseInt(process.env.RELAY_BASE || '0');
            const blossomBase = parseInt(process.env.BLOSSOM_BASE || '0');
            const gatewayBase = parseInt(process.env.GATEWAY_BASE || '0');
            const relayPR = parseInt(process.env.RELAY_PR || '0');
            const blossomPR = parseInt(process.env.BLOSSOM_PR || '0');
            const gatewayPR = parseInt(process.env.GATEWAY_PR || '0');

            const WARN_LIMIT = 750 * 1024;
            const FAIL_LIMIT = 1024 * 1024;

            function formatSize(bytes) {
              return (bytes / 1024).toFixed(1) + ' KB';
            }

            function formatDelta(base, pr) {
              const delta = pr - base;
              if (base === 0) return 'N/A';
              const sign = delta >= 0 ? '+' : '';
              return `${sign}${(delta / 1024).toFixed(1)} KB`;
            }

            function status(bytes) {
              if (bytes > FAIL_LIMIT) return ':x: >1MB';
              if (bytes > WARN_LIMIT) return ':warning: >750KB';
              return ':white_check_mark: OK';
            }

            const rows = [
              { name: 'relay', base: relayBase, pr: relayPR },
              { name: 'blossom', base: blossomBase, pr: blossomPR },
              { name: 'gateway', base: gatewayBase, pr: gatewayPR },
            ];

            const table = rows.map(r =>
              `| ${r.name} | ${formatSize(r.base)} | ${formatSize(r.pr)} | ${formatDelta(r.base, r.pr)} | ${status(r.pr)} |`
            ).join('\n');

            const body = `<!-- bundle-size-report -->
            ## Bundle Size Report

            | Bundle | Base | PR | Delta | Status |
            |--------|------|----|-------|--------|
            ${table}

            > Generated by CI — hard limit 1MB, warning at 750KB.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- bundle-size-report -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
