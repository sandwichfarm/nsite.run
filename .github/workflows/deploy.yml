name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
jobs:
  deploy:
    name: Build and deploy to Bunny Edge Scripting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all bundles
        run: deno task build

      - name: Enforce bundle size limits (safety check before deploy)
        run: deno run --allow-read scripts/check-bundle-sizes.ts

      - name: Build SPA
        run: |
          cd apps/spa
          npm ci
          npm run build

      - name: Debug storage auth
        run: |
          echo "STORAGE_HOSTNAME length: ${#STORAGE_HOSTNAME}"
          echo "STORAGE_USERNAME length: ${#STORAGE_USERNAME}"
          echo "STORAGE_PASSWORD length: ${#STORAGE_PASSWORD}"
          echo "API_KEY length: ${#API_KEY}"
          echo "PULLZONE_ID length: ${#PULLZONE_ID}"
          echo "STORAGE_HOSTNAME first 5 chars: ${STORAGE_HOSTNAME:0:5}"
          echo "Test storage list:"
          curl -s -w "\nHTTP_CODE:%{http_code}\n" \
            -H "AccessKey: ${STORAGE_PASSWORD}" \
            "https://${STORAGE_HOSTNAME}/${STORAGE_USERNAME}/" | tail -5
          echo "Test API auth:"
          curl -s -w "\nHTTP_CODE:%{http_code}\n" \
            -H "AccessKey: ${API_KEY}" \
            "https://api.bunny.net/pullzone/${PULLZONE_ID}" | head -3
        env:
          STORAGE_HOSTNAME: ${{ secrets.BUNNY_STORAGE_HOSTNAME }}
          STORAGE_USERNAME: ${{ secrets.BUNNY_STORAGE_USERNAME }}
          STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD }}
          API_KEY: ${{ secrets.BUNNY_API_KEY }}
          PULLZONE_ID: ${{ secrets.BUNNY_GATEWAY_PULLZONE_ID }}

      - name: Deploy SPA to Bunny Storage
        run: |
          cd apps/spa/dist
          for file in $(find . -type f); do
            path="${file#./}"
            curl -s -X PUT \
              -H "AccessKey: ${{ secrets.BUNNY_STORAGE_PASSWORD }}" \
              -H "Content-Type: $(file --mime-type -b "$file")" \
              --data-binary "@$file" \
              "https://${{ secrets.BUNNY_STORAGE_HOSTNAME }}/${{ secrets.BUNNY_STORAGE_USERNAME }}/nsite-spa/$path"
          done

      - name: Purge CDN cache
        run: |
          curl -s -X POST "https://api.bunny.net/pullzone/${{ secrets.BUNNY_GATEWAY_PULLZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}"

      - name: Deploy relay
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_RELAY_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_RELAY_DEPLOY_KEY }}
          file: apps/relay/dist/relay.bundle.js

      - name: Deploy blossom
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_BLOSSOM_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_BLOSSOM_DEPLOY_KEY }}
          file: apps/blossom/dist/blossom.bundle.js

      - name: Deploy gateway
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_GATEWAY_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_GATEWAY_DEPLOY_KEY }}
          file: apps/gateway/dist/gateway.bundle.js
