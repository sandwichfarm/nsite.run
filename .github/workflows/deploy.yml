name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
  workflow_dispatch:
  
jobs:
  deploy:
    name: Build and deploy to Bunny Edge Scripting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all bundles
        run: deno task build

      - name: Enforce bundle size limits (safety check before deploy)
        run: deno run --allow-read scripts/check-bundle-sizes.ts

      - name: Build SPA
        run: |
          cd apps/spa
          npm ci
          npm run build

      - name: Clean old SPA files from Bunny Storage
        run: |
          # List existing files and delete them before uploading new ones
          FILES=$(curl -s -H "AccessKey: ${{ secrets.BUNNY_STORAGE_PASSWORD }}" \
            "https://${{ secrets.BUNNY_STORAGE_HOSTNAME }}/${{ secrets.BUNNY_STORAGE_USERNAME }}/nsite-spa/assets/")
          echo "$FILES" | jq -r '.[].ObjectName' 2>/dev/null | while read -r name; do
            echo "Deleting old asset: $name"
            curl -s -X DELETE \
              -H "AccessKey: ${{ secrets.BUNNY_STORAGE_PASSWORD }}" \
              "https://${{ secrets.BUNNY_STORAGE_HOSTNAME }}/${{ secrets.BUNNY_STORAGE_USERNAME }}/nsite-spa/assets/$name"
          done

      - name: Deploy SPA to Bunny Storage
        run: |
          cd apps/spa/dist
          for file in $(find . -type f); do
            path="${file#./}"
            curl -s -X PUT \
              -H "AccessKey: ${{ secrets.BUNNY_STORAGE_PASSWORD }}" \
              -H "Content-Type: $(file --mime-type -b "$file")" \
              --data-binary "@$file" \
              "https://${{ secrets.BUNNY_STORAGE_HOSTNAME }}/${{ secrets.BUNNY_STORAGE_USERNAME }}/nsite-spa/$path"
          done

      - name: Purge CDN caches
        run: |
          # Purge SPA assets CDN (next-nsite-run pull zone — where edge script fetches SPA from)
          echo "Purging SPA assets CDN..."
          curl -s -X POST "https://api.bunny.net/pullzone/${{ secrets.BUNNY_PULLZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}"
          # Purge gateway CDN (nsite-gateway pull zone — what users hit)
          echo "Purging gateway CDN..."
          curl -s -X POST "https://api.bunny.net/pullzone/${{ secrets.BUNNY_GATEWAY_PULLZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}"

      - name: Deploy relay
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_RELAY_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_RELAY_DEPLOY_KEY }}
          file: apps/relay/dist/relay.bundle.js

      - name: Deploy blossom
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_BLOSSOM_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_BLOSSOM_DEPLOY_KEY }}
          file: apps/blossom/dist/blossom.bundle.js

      - name: Deploy gateway
        uses: BunnyWay/actions/deploy-script@main
        with:
          script_id: ${{ secrets.BUNNY_GATEWAY_SCRIPT_ID }}
          deploy_key: ${{ secrets.BUNNY_GATEWAY_DEPLOY_KEY }}
          file: apps/gateway/dist/gateway.bundle.js
