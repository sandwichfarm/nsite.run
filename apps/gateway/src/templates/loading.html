<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading nsite...</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #333;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.10);
        padding: 36px 40px;
        text-align: center;
        max-width: 320px;
        width: 90%;
      }
      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 16px;
        display: block;
        background: #e0e0e0;
      }
      .avatar-placeholder {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #e0e0e0;
        margin: 0 auto 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: #999;
      }
      .display-name {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #111;
      }
      .status {
        font-size: 14px;
        color: #777;
        margin-bottom: 20px;
      }
      .spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid #e0e0e0;
        border-top-color: #7b6ef6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      {{AVATAR_SECTION}}
      <div class="display-name">{{DISPLAY_NAME}}</div>
      <div class="status">Fetching site content...</div>
      <span class="spinner"></span>
    </div>
    <script>
      (function () {
        var key = "{{CACHE_KEY}}";
        var interval = setInterval(function () {
          fetch("/_nsite/ready?k=" + encodeURIComponent(key))
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.ready === true) {
                clearInterval(interval);
                window.location.reload();
              }
            })
            .catch(function () {/* ignore errors, keep polling */});
        }, 2000);
      })();
    </script>
  </body>
</html>
